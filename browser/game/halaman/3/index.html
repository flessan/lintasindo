<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Teman Lalu Lintas — Quiz Rambu Indonesia Lengkap</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #E8F0FE;
            --card: #fff;
            --pri: #0D47A1;
            --pri2: #1976D2;
            --sec: #00BCD4;
            --acc: #FF8F00;
            --warn: #FF6D00;
            --dng: #D32F2F;
            --suc: #2E7D32;
            --txt: #0D1B2A;
            --brd: #0D1B2A;
            --mut: #607D8B;
            --sh: 4px 4px 0 var(--brd);
            --sh2: 3px 3px 0 var(--brd);
            --r: 12px;
            --fd: 'Fredoka', sans-serif;
            --fb: 'Nunito', sans-serif
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: var(--fb);
            background: var(--bg);
            color: var(--txt);
            min-height: 100dvh;
            overflow: hidden;
            position: relative
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, var(--brd) .8px, transparent .8px);
            background-size: 24px 24px;
            opacity: .035;
            pointer-events: none;
            z-index: 0
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: .08;
            filter: blur(1px)
        }

        .blob:nth-child(1) {
            width: 220px;
            height: 220px;
            background: var(--pri);
            top: -40px;
            left: -60px;
            animation: bfloat 18s infinite ease-in-out
        }

        .blob:nth-child(2) {
            width: 170px;
            height: 170px;
            background: var(--acc);
            top: 45%;
            right: -50px;
            animation: bfloat 15s infinite ease-in-out -4s;
            border-radius: 30%
        }

        .blob:nth-child(3) {
            width: 120px;
            height: 120px;
            background: var(--sec);
            bottom: 5%;
            left: 10%;
            animation: bfloat 20s infinite ease-in-out -8s
        }

        .blob:nth-child(4) {
            width: 140px;
            height: 140px;
            background: var(--suc);
            bottom: -40px;
            right: 25%;
            animation: bfloat 17s infinite ease-in-out -3s
        }

        @keyframes bfloat {

            0%,
            100% {
                transform: translateY(0) rotate(0) scale(1)
            }

            33% {
                transform: translateY(-18px) rotate(3deg) scale(1.02)
            }

            66% {
                transform: translateY(10px) rotate(-2deg) scale(.98)
            }
        }

        #app {
            position: relative;
            width: 100%;
            height: 100dvh;
            z-index: 1;
            overflow: hidden
        }

        .scr {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: scale(.96) translateY(6px);
            transition: opacity .28s, transform .28s;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 18px 14px;
            scrollbar-width: thin
        }

        .scr.on {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0)
        }

        .nb {
            font-family: var(--fd);
            font-weight: 600;
            border: 3px solid var(--brd);
            border-radius: var(--r);
            box-shadow: var(--sh);
            cursor: pointer;
            transition: transform .1s, box-shadow .1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
            line-height: 1.2;
            background: var(--card);
            color: var(--txt);
            font-size: inherit
        }

        .nb:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--brd)
        }

        .nb:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--brd)
        }

        .nb-p {
            background: var(--pri);
            color: #fff
        }

        .nb-a {
            background: var(--acc);
            color: #fff
        }

        .nb-s {
            background: var(--suc);
            color: #fff
        }

        .nb-d {
            background: var(--dng);
            color: #fff
        }

        .nc {
            background: var(--card);
            border: 3px solid var(--brd);
            border-radius: var(--r);
            box-shadow: var(--sh);
            padding: 18px
        }

        .mt {
            font-family: var(--fd);
            font-size: clamp(1.9rem, 7vw, 3rem);
            font-weight: 700;
            color: var(--pri);
            text-align: center;
            line-height: 1.12;
            text-shadow: 3px 3px 0 var(--brd)
        }

        .ms {
            font-size: clamp(.82rem, 2.4vw, 1rem);
            color: var(--mut);
            text-align: center;
            font-weight: 700;
            margin: 3px 0 18px
        }

        .mm {
            width: 105px;
            height: 105px;
            margin-bottom: 10px;
            animation: mbob 2s infinite ease-in-out
        }

        @keyframes mbob {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-9px);
            }
        }

        .mbtn {
            display: flex;
            flex-direction: column;
            gap: 11px;
            width: 100%;
            max-width: 290px
        }

        .mbtn .nb {
            padding: 14px 20px;
            font-size: 1.05rem;
            border-radius: 14px
        }

        .st {
            font-family: var(--fd);
            font-size: clamp(1.15rem, 3.8vw, 1.5rem);
            font-weight: 700;
            color: var(--txt);
            text-shadow: 2px 2px 0 var(--brd);
            text-align: center
        }

        .lg {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin-top: 12px
        }

        .lc {
            background: var(--card);
            border: 3px solid var(--brd);
            border-radius: var(--r);
            box-shadow: var(--sh2);
            padding: 12px 9px;
            text-align: center;
            cursor: pointer;
            transition: transform .1s, box-shadow .1s;
            position: relative;
            overflow: hidden
        }

        .lc:hover:not(.lk) {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 var(--brd)
        }

        .lc:active:not(.lk) {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--brd)
        }

        .lc.lk {
            opacity: .4;
            cursor: not-allowed
        }

        .lc.lk::after {
            content: '\f023';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: var(--mut);
            background: rgba(255, 255, 255, .5)
        }

        .lc .li {
            font-size: 1.7rem;
            margin-bottom: 5px
        }

        .lc .ln {
            font-family: var(--fd);
            font-weight: 700;
            font-size: .82rem;
            margin-bottom: 3px
        }

        .lc .lp {
            font-size: .68rem;
            color: var(--mut);
            font-weight: 700;
            margin-bottom: 2px
        }

        .lc .ls {
            color: var(--acc);
            font-size: .78rem
        }

        .lc .ls .e {
            color: #CFD8DC
        }

        .lc.ch {
            grid-column: 1/-1;
            background: linear-gradient(135deg, var(--acc), var(--warn))
        }

        .lc.ch .ln {
            color: #fff;
            text-shadow: 1px 1px 0 var(--brd)
        }

        .lc.ch .lp {
            color: rgba(255, 255, 255, .8)
        }

        .lc.ch .ls .e {
            color: rgba(255, 255, 255, .3)
        }

        .qh {
            width: 100%;
            max-width: 520px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 5px;
            flex-wrap: wrap
        }

        .qb {
            background: var(--card);
            border: 3px solid var(--brd);
            border-radius: 9px;
            box-shadow: var(--sh2);
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .95rem;
            color: var(--txt);
            transition: transform .1s, box-shadow .1s
        }

        .qb:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--brd)
        }

        .qb:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--brd)
        }

        .qi {
            display: flex;
            gap: 8px;
            align-items: center
        }

        .qii {
            font-family: var(--fd);
            font-weight: 700;
            font-size: .78rem;
            background: var(--card);
            border: 2px solid var(--brd);
            border-radius: 7px;
            box-shadow: 2px 2px 0 var(--brd);
            padding: 4px 9px;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .qii i {
            font-size: .7rem
        }

        .qii .sk {
            color: var(--warn)
        }

        .qpb {
            width: 100%;
            max-width: 520px;
            height: 8px;
            background: var(--bg);
            border: 2px solid var(--brd);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px
        }

        .qpf {
            height: 100%;
            background: var(--pri);
            border-radius: 2px;
            transition: width .3s
        }

        .qtb {
            width: 100%;
            max-width: 520px;
            height: 7px;
            background: var(--bg);
            border: 2px solid var(--brd);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
            display: none
        }

        .qtf {
            height: 100%;
            background: var(--suc);
            border-radius: 2px;
            transition: width .1s linear, background .3s
        }

        .qsa {
            width: 100%;
            max-width: 520px;
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
            min-height: 120px;
            align-items: center
        }

        .qsa img {
            max-width: clamp(110px, 30vw, 160px);
            max-height: clamp(110px, 30vw, 160px);
            object-fit: contain;
            filter: drop-shadow(3px 3px 0 var(--brd));
            border-radius: 6px
        }

        .qsa .qsi {
            font-size: clamp(2.8rem, 9vw, 4.5rem);
            filter: drop-shadow(3px 3px 0 var(--brd))
        }

        .sf {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--fd);
            font-weight: 700;
            font-size: .85rem;
            text-align: center;
            padding: 8px;
            line-height: 1.2;
            border-radius: 8px;
            border: 3px solid var(--brd);
            color: var(--txt)
        }

        .qq {
            font-family: var(--fd);
            font-size: clamp(.92rem, 3vw, 1.15rem);
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
            max-width: 480px;
            line-height: 1.4
        }

        .qo {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px
        }

        .ob {
            width: 100%;
            background: var(--card);
            border: 3px solid var(--brd);
            border-radius: 9px;
            box-shadow: var(--sh2);
            padding: 12px 14px;
            font-family: var(--fb);
            font-size: clamp(.8rem, 2.5vw, .92rem);
            font-weight: 700;
            color: var(--txt);
            text-align: left;
            cursor: pointer;
            transition: transform .1s, box-shadow .1s, background .15s, color .15s;
            display: flex;
            align-items: center;
            gap: 10px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.3
        }

        .ob:hover:not(.dis) {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 var(--brd)
        }

        .ob:active:not(.dis) {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--brd)
        }

        .ob .ol {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border: 2px solid var(--brd);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--fd);
            font-weight: 700;
            font-size: .75rem;
            background: var(--bg)
        }

        .ob.ok {
            background: var(--suc) !important;
            color: #fff !important
        }

        .ob.ok .ol {
            background: rgba(255, 255, 255, .25);
            color: #fff;
            border-color: rgba(255, 255, 255, .4)
        }

        .ob.no {
            background: var(--dng) !important;
            color: #fff !important;
            animation: shk .4s
        }

        .ob.no .ol {
            background: rgba(255, 255, 255, .25);
            color: #fff;
            border-color: rgba(255, 255, 255, .4)
        }

        .ob.dis {
            pointer-events: none;
            opacity: .5
        }

        .ob.dis.ok {
            opacity: 1
        }

        @keyframes shk {

            0%,
            100% {
                transform: translateX(0)
            }

            20% {
                transform: translateX(-6px)
            }

            40% {
                transform: translateX(6px)
            }

            60% {
                transform: translateX(-3px)
            }

            80% {
                transform: translateX(3px)
            }
        }

        .qe {
            width: 100%;
            max-width: 520px;
            background: #FFF8E1;
            border: 3px solid var(--brd);
            border-radius: 9px;
            box-shadow: var(--sh2);
            padding: 12px 14px;
            font-size: .84rem;
            font-weight: 700;
            line-height: 1.5;
            display: none;
            align-items: flex-start;
            gap: 8px
        }

        .qe.v {
            display: flex
        }

        .qe i {
            color: var(--acc);
            font-size: .95rem;
            margin-top: 2px;
            flex-shrink: 0
        }

        .qnb {
            display: none;
            margin-top: 2px
        }

        .qnb.v {
            display: inline-flex
        }

        .qmc {
            width: 60px;
            height: 60px;
            margin-top: 2px
        }

        .sp {
            position: fixed;
            font-family: var(--fd);
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--suc);
            pointer-events: none;
            z-index: 100;
            animation: fup .8s ease forwards;
            text-shadow: 2px 2px 0 var(--brd)
        }

        @keyframes fup {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-55px) scale(1.2);
            }
        }

        .rs {
            font-family: var(--fd);
            font-size: clamp(2.2rem, 9vw, 3.5rem);
            font-weight: 700;
            color: var(--pri);
            text-shadow: 3px 3px 0 var(--brd);
            margin: 5px 0
        }

        .rst {
            font-size: 2.2rem;
            margin: 8px 0
        }

        .rst .st {
            color: #CFD8DC;
            display: inline-block;
            transition: color .3s, transform .3s
        }

        .rst .st.ed {
            color: var(--acc);
            animation: spop .4s ease backwards
        }

        .rst .st:nth-child(2).ed {
            animation-delay: .2s
        }

        .rst .st:nth-child(3).ed {
            animation-delay: .4s
        }

        @keyframes spop {
            0% {
                transform: scale(0) rotate(-20deg);
                opacity: 0;
            }

            60% {
                transform: scale(1.3) rotate(6deg);
                opacity: 1;
            }

            100% {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        .rl {
            font-weight: 800;
            color: var(--mut);
            font-size: .88rem
        }

        .rbtn {
            display: flex;
            gap: 9px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center
        }

        .rbtn .nb {
            padding: 12px 20px;
            font-size: .92rem
        }

        .gtabs {
            display: flex;
            gap: 5px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 3px;
            scrollbar-width: none
        }

        .gtabs::-webkit-scrollbar {
            display: none
        }

        .gtab {
            flex-shrink: 0;
            padding: 7px 14px;
            border: 2px solid var(--brd);
            border-radius: 7px;
            box-shadow: var(--sh2);
            font-family: var(--fd);
            font-weight: 700;
            font-size: .75rem;
            background: var(--card);
            cursor: pointer;
            transition: transform .1s, background .15s;
            white-space: nowrap;
            color: var(--txt)
        }

        .gtab:hover {
            transform: translate(-1px, -1px)
        }

        .gtab:active {
            transform: translate(1px, 1px);
            box-shadow: 0 0 0 var(--brd)
        }

        .gtab.on {
            background: var(--pri);
            color: #fff
        }

        .ggrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 9px;
            width: 100%;
            max-width: 600px;
            padding-bottom: 30px
        }

        .gc {
            background: var(--card);
            border: 3px solid var(--brd);
            border-radius: var(--r);
            box-shadow: var(--sh2);
            overflow: hidden;
            cursor: pointer;
            transition: transform .1s, box-shadow .1s
        }

        .gc:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 var(--brd)
        }

        .gc:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--brd)
        }

        .gc-img {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f6f8;
            overflow: hidden;
            padding: 6px
        }

        .gc-img img {
            width: 82%;
            height: 82%;
            object-fit: contain
        }

        .gc-info {
            padding: 7px 8px;
            text-align: center
        }

        .gc-info .gn {
            font-family: var(--fd);
            font-weight: 700;
            font-size: .68rem;
            line-height: 1.25;
            margin-bottom: 1px
        }

        .gc-info .gcode {
            font-size: .62rem;
            color: var(--mut);
            font-weight: 700
        }

        .gmod {
            position: fixed;
            inset: 0;
            background: rgba(13, 27, 42, .55);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px
        }

        .gmod.v {
            display: flex
        }

        .gmod-box {
            background: var(--card);
            border: 3px solid var(--brd);
            border-radius: var(--r);
            box-shadow: 8px 8px 0 var(--brd);
            padding: 22px;
            max-width: 400px;
            width: 100%;
            max-height: 85dvh;
            overflow-y: auto;
            position: relative
        }

        .gmod-x {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 34px;
            height: 34px;
            border: 2px solid var(--brd);
            border-radius: 7px;
            box-shadow: 2px 2px 0 var(--brd);
            background: var(--card);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .95rem;
            transition: transform .1s
        }

        .gmod-x:hover {
            transform: translate(-1px, -1px)
        }

        .gmod-x:active {
            transform: translate(1px, 1px);
            box-shadow: 0 0 0 var(--brd)
        }

        .gmod-img {
            width: 150px;

            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f6f8;
            border: 3px solid var(--brd);
            border-radius: 10px;
            overflow: hidden;
            padding: 8px
        }

        .gmod-img img {
            width: 85%;
            height: 85%;
            object-fit: contain
        }

        .gmod-badge {
            display: inline-block;
            padding: 3px 11px;
            border: 2px solid var(--brd);
            border-radius: 5px;
            font-family: var(--fd);
            font-weight: 700;
            font-size: .72rem;
            margin-bottom: 7px
        }

        .gmod-name {
            font-family: var(--fd);
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 3px
        }

        .gmod-code {
            font-size: .82rem;
            color: var(--mut);
            font-weight: 700;
            margin-bottom: 10px
        }

        .gmod-desc {
            font-size: .85rem;
            font-weight: 700;
            line-height: 1.6;
            color: var(--txt);
            background: #F5F5F5;
            border: 2px solid var(--brd);
            border-radius: 7px;
            padding: 11px 13px
        }

        .lbl {
            width: 100%;
            max-width: 470px;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .lbi {
            display: flex;
            align-items: center;
            gap: 9px;
            background: var(--card);
            border: 2px solid var(--brd);
            border-radius: 9px;
            box-shadow: var(--sh2);
            padding: 10px 12px;
            font-weight: 700;
            font-size: .82rem
        }

        .lbr {
            width: 28px;
            height: 28px;
            border: 2px solid var(--brd);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--fd);

    <script>
        // ==================== AUDIO ====================
        const AU = { ctx: null, snd: true, mus: false, init() { if (this.ctx) return; this.ctx = new (window.AudioContext || window.webkitAudioContext)() }, tone(f, t, d, type = 'sine', v = .18) { if (!this.snd || !this.ctx) return; const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = type; o.frequency.value = f; g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(.001, t + d); o.connect(g).connect(this.ctx.destination); o.start(t); o.stop(t + d + .05) }, ok() { const t = this.ctx.currentTime;[523.25, 659.25, 783.99].forEach((f, i) => this.tone(f, t + i * .1, .28)) }, no() { const t = this.ctx.currentTime;[329.63, 261.63, 196].forEach((f, i) => this.tone(f, t + i * .12, .32, 'triangle', .15)) }, clk() { if (!this.snd || !this.ctx) return; const t = this.ctx.currentTime; const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(880, t); o.frequency.exponentialRampToValueAtTime(550, t + .04); g.gain.setValueAtTime(.08, t); g.gain.exponentialRampToValueAtTime(.001, t + .06); o.connect(g).connect(this.ctx.destination); o.start(t); o.stop(t + .07) }, win() { const t = this.ctx.currentTime;[523.25, 587.33, 659.25, 783.99, 1046.5].forEach((f, i) => this.tone(f, t + i * .12, .38)) }, startMus() { }, stopMus() { } };

        // ==================== CONFETTI ====================
        const CF = { cv: null, cx: null, ps: [], run: false, init() { this.cv = document.getElementById('cc'); this.cx = this.cv.getContext('2d'); this.rsz(); window.addEventListener('resize', () => this.rsz()) }, rsz() { this.cv.width = innerWidth; this.cv.height = innerHeight }, burst(x, y, n = 50) { const cs = ['#D32F2F', '#FF8F00', '#2E7D32', '#0D47A1', '#00BCD4', '#FF6D00', '#E040FB', '#FFD600']; for (let i = 0; i < n; i++) { const a = Math.PI * 2 * i / n + (Math.random() - .5) * .5, sp = 3.5 + Math.random() * 7; this.ps.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2.5, sz: 3.5 + Math.random() * 5.5, c: cs[Math.random() * cs.length | 0], r: Math.random() * 360, rs: (Math.random() - .5) * 11, l: 1, d: .012 + Math.random() * .014, sh: Math.random() > .5 ? 'r' : 'c' }) } if (!this.run) this.anim() }, anim() { this.run = true; this.cx.clearRect(0, 0, this.cv.width, this.cv.height); this.ps = this.ps.filter(p => { p.x += p.vx; p.y += p.vy; p.vy += .22; p.vx *= .99; p.r += p.rs; p.l -= p.d; if (p.l <= 0) return false; this.cx.save(); this.cx.translate(p.x, p.y); this.cx.rotate(p.r * Math.PI / 180); this.cx.globalAlpha = Math.min(1, p.l * 2); this.cx.fillStyle = p.c; if (p.sh === 'r') this.cx.fillRect(-p.sz / 2, -p.sz / 2, p.sz, p.sz * .55); else { this.cx.beginPath(); this.cx.arc(0, 0, Math.max(1, p.sz / 2), 0, Math.PI * 2); this.cx.fill() } this.cx.restore(); return true }); if (this.ps.length > 0) requestAnimationFrame(() => this.anim()); else { this.run = false; this.cx.clearRect(0, 0, this.cv.width, this.cv.height) } } };

        // ==================== MASCOT ====================
        function mascot(st = 'happy', sz = 100) {
            const c = sz / 2, r = sz * .4;
            const E = {
                happy: { eL: `<circle cx="${c - r * .32}" cy="${c - r * .1}" r="${r * .12}" fill="#0D1B2A"/><circle cx="${c - r * .3}" cy="${c - r * .14}" r="${r * .04}" fill="#fff"/>`, eR: `<circle cx="${c + r * .32}" cy="${c - r * .1}" r="${r * .12}" fill="#0D1B2A"/><circle cx="${c + r * .34}" cy="${c - r * .14}" r="${r * .04}" fill="#fff"/>`, m: `<path d="M${c - r * .26} ${c + r * .22} Q${c} ${c + r * .48} ${c + r * .26} ${c + r * .22}" fill="none" stroke="#0D1B2A" stroke-width="${r * .08}" stroke-linecap="round"/>`, ch: `<circle cx="${c - r * .5}" cy="${c + r * .1}" r="${r * .09}" fill="#FF8A80" opacity=".5"/><circle cx="${c + r * .5}" cy="${c + r * .1}" r="${r * .09}" fill="#FF8A80" opacity=".5"/>`, bc: '#0D47A1' },

            }; const e = E[st] || E.happy;
            return `<svg viewBox="0 0 ${sz} ${sz}" xmlns="http://www.w3.org/2000/svg"><circle cx="${c}" cy="${c}" r="${r}" fill="${e.bc}" stroke="#0D1B2A" stroke-width="${sz * .028}"/><circle cx="${c}" cy="${c - r * .44}" r="${r * .14}" fill="#FF8F00" stroke="#0D1B2A" stroke-width="${sz * .018}"/><circle cx="${c}" cy="${c - r * .44}" r="${r * .07}" fill="#FF6D00"/>${e.eL}${e.eR}${e.m}${e.ch}</svg>`

        // ==================== PATH GAMBAR LOKAL ====================

        // ==================== FALLBACK RAMBU (jika gambar tidak ada) ====================
        function signFB(cat, code) {
            const s = 90, c = s / 2, r = s * .38;
            if (cat === 'peringatan') {
                const pts = `${c},${s * .06} ${s * .94},${c} ${c},${s * .94} ${s * .06},${c}`;

            }
            if (cat === 'larangan') {
                return `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg"><circle cx="${c}" cy="${c}" r="${r}" fill="#fff" stroke="#D32F2F" stroke-width="5"/><line x1="${c - r * .7}" y1="${c + r * .7}" x2="${c + r * .7}" y2="${c - r * .7}" stroke="#D32F2F" stroke-width="4" stroke-linecap="round"/><text x="${c}" y="${c + 2}" text-anchor="middle" dy=".35em" font-family="Fredoka,sans-serif" font-weight="700" font-size="11" fill="#0D1B2A">${code}</text></svg>`

        // ==================== STATE ====================
        const DEF = { cat: { peringatan: { bs: 0, st: 0 }, larangan: { bs: 0, st: 0 }, perintah: { bs: 0, st: 0 }, petunjuk: { bs: 0, st: 0 }, keselamatan: { bs: 0, st: 0 } }, ch: { bs: 0 }, set: { snd: true, mus: false, tmr: false }, lb: [] };

        function save() { try { localStorage.setItem('tll', JSON.stringify(GS)) } catch (e) { } }
        function load() { try { const s = localStorage.getItem('tll'); if (s) { const p = JSON.parse(s); GS = { ...JSON.parse(JSON.stringify(DEF)), ...p }; GS.cat = { ...DEF.cat, ...p.cat }; GS.set = { ...DEF.set, ...p.set }; if (!Array.isArray(GS.lb)) GS.lb = [] } } catch (e) { } }
        function addLB(cat, sc, st) { GS.lb.push({ d: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }), c: cat === 'challenge' ? 'Tantangan' : CATS.find(c => c.id === cat)?.name || cat, sc, st, t: Date.now() }); GS.lb.sort((a, b) => b.sc - a.sc); GS.lb = GS.lb.slice(0, 20); save() }

        // ==================== MODAL & TOAST ====================
        let mcb = null;

        // ==================== QUIZ ====================
        let QZ = { cat: null, qs: [], ci: 0, sc: 0, sk: 0, ms: 0, cc: 0, cnc: 0, ans: false, ti: null, tl: 0, isch: false };

        function startQ(catId, isCh = false) {
            AU.init();
            if (isCh) { let a = []; Object.keys(QS).forEach(k => { QS[k].forEach((q, i) => a.push({ ...q, cid: k, oi: i })) }); shuf(a); QZ = { cat: 'challenge', qs: a, ci: 0, sc: 0, sk: 0, ms: 0, cc: 0, cnc: 0, ans: false, ti: null, tl: 0, isch: true } }
            else { let qs = QS[catId].map((q, i) => ({ ...q, cid: catId, oi: i })); shuf(qs); QZ = { cat: catId, qs, ci: 0, sc: 0, sk: 0, ms: 0, cc: 0, cnc: 0, ans: false, ti: null, tl: 0, isch: false } }
            nav('s-quiz'); renderQ()
        }

        function renderQ() {
            const q = QZ.qs[QZ.ci], tot = QZ.qs.length; QZ.ans = false;
            document.querySelector('#qip span').textContent = `${QZ.ci + 1}/${tot}`;
            document.querySelector('#qis span').textContent = QZ.sc;
            document.getElementById('qs-ok').textContent = QZ.cc;
            document.getElementById('qs-no').textContent = QZ.cnc;
            document.getElementById('qs-sk').textContent = QZ.sk;
            const sk = document.getElementById('qik');
            if (QZ.sk >= 2) { sk.style.display = 'flex'; sk.querySelector('.sk').innerHTML = `<i class="fa-solid fa-fire"></i> x${QZ.sk}` } else sk.style.display = 'none';
            document.getElementById('qpf').style.width = `${(QZ.ci / tot) * 100}%`;
            const ut = QZ.isch || GS.set.tmr, tb = document.getElementById('qtb'), tf = document.getElementById('qtf');
            if (ut) { tb.style.display = 'block'; QZ.tl = QZ.isch ? 15 : 20; tf.style.width = '100%'; tf.style.backgroundColor = 'var(--suc)'; clearInterval(QZ.ti); const tt = QZ.tl; QZ.ti = setInterval(() => { QZ.tl -= .1; if (QZ.tl <= 0) { QZ.tl = 0; clearInterval(QZ.ti); if (!QZ.ans) timeUp() } const p = (QZ.tl / tt) * 100; tf.style.width = p + '%'; tf.style.backgroundColor = p > 50 ? 'var(--suc)' : p > 25 ? 'var(--acc)' : 'var(--dng)' }, 100) } else tb.style.display = 'none';

            const sa = document.getElementById('qsa');
            if (q.img) {
                sa.innerHTML = `<img src="${q.img}" alt="${q.code || 'Rambu'}" onerror="imgErr(this,'${q.cat}','${q.code || '?'}')">`;
                sa.style.display = 'flex';
            }
            else if (q.icon) { sa.innerHTML = `<i class="fa-solid ${q.icon} qsi" style="color:${q.fb}"></i>`; sa.style.display = 'flex' }
            else { sa.innerHTML = ''; sa.style.display = 'none' }

            document.getElementById('qqt').textContent = q.q;
            const L = ['A', 'B', 'C', 'D'];
            document.getElementById('qop').innerHTML = q.o.map((o, i) => `<button class="ob" onclick="selAns(${i})"><span class="ol">${L[i]}</span><span>${o}</span></button>`).join('');
            document.getElementById('qex').classList.remove('v');
            document.getElementById('qnxt').classList.remove('v');
            document.getElementById('qmasc').innerHTML = mascot('think', 60)
        }

        function selAns(i) {
            if (QZ.ans) return; QZ.ans = true; clearInterval(QZ.ti);
            const q = QZ.qs[QZ.ci], ok = i === q.c, btns = document.querySelectorAll('.ob');
            btns.forEach(b => b.classList.add('dis')); btns[q.c].classList.add('ok');
            if (ok) { QZ.sk++; if (QZ.sk > QZ.ms) QZ.ms = QZ.sk; QZ.cc++; let p = 100; if (QZ.sk >= 3) p += 25; if (QZ.sk >= 5) p += 25; if (document.getElementById('qtb').style.display === 'block') p += Math.round(QZ.tl * 2); QZ.sc += p; document.querySelector('#qis span').textContent = QZ.sc; document.getElementById('qs-ok').textContent = QZ.cc; document.getElementById('qs-sk').textContent = QZ.sk; AU.ok(); CF.burst(innerWidth / 2, innerHeight / 2, 50); showSP(`+${p}`); document.getElementById('qmasc').innerHTML = mascot('happy', 60) }
            else { btns[i].classList.add('no'); QZ.sk = 0; QZ.cnc++; document.getElementById('qs-no').textContent = QZ.cnc; document.getElementById('qs-sk').textContent = QZ.sk; AU.no(); document.getElementById('qmasc').innerHTML = mascot('sad', 60); document.getElementById('qik').style.display = 'none' }
            const ex = document.getElementById('qex'); ex.querySelector('span').textContent = q.e; ex.classList.add('v');
            const nb = document.getElementById('qnxt'); nb.classList.add('v'); nb.innerHTML = QZ.ci >= QZ.qs.length - 1 ? 'Lihat Hasil <i class="fa-solid fa-flag-checkered"></i>' : 'Lanjut <i class="fa-solid fa-arrow-right"></i>'
        }

        function timeUp() {
            QZ.ans = true; QZ.sk = 0; QZ.cnc++; document.getElementById('qs-no').textContent = QZ.cnc; document.getElementById('qs-sk').textContent = 0;
            const q = QZ.qs[QZ.ci], btns = document.querySelectorAll('.ob');
            btns.forEach(b => b.classList.add('dis')); btns[q.c].classList.add('ok');
            AU.no(); document.getElementById('qmasc').innerHTML = mascot('sad', 60); document.getElementById('qik').style.display = 'none';
            const ex = document.getElementById('qex'); ex.querySelector('span').textContent = 'Waktu habis! ' + q.e; ex.classList.add('v');
            const nb = document.getElementById('qnxt'); nb.classList.add('v'); nb.innerHTML = QZ.ci >= QZ.qs.length - 1 ? 'Lihat Hasil <i class="fa-solid fa-flag-checkered"></i>' : 'Lanjut <i class="fa-solid fa-arrow-right"></i>'
        }

        function nxtQ() { AU.clk(); QZ.ci++; if (QZ.ci >= QZ.qs.length) finQ(); else renderQ() }

        function finQ() {
            clearInterval(QZ.ti); const tot = QZ.qs.length, ok = QZ.cc, pct = ok / tot;
            let st = pct >= 1 ? 3 : pct >= .8 ? 2 : pct >= .6 ? 1 : 0;
            if (QZ.isch) { if (QZ.sc > GS.ch.bs) GS.ch.bs = QZ.sc } else { const c = GS.cat[QZ.cat]; if (QZ.sc > c.bs) c.bs = QZ.sc; if (st > c.st) c.st = st }
            addLB(QZ.cat, QZ.sc, st); save();
            document.getElementById('rlab').textContent = QZ.isch ? 'Tantangan Selesai!' : 'Level Selesai!';
            document.getElementById('rsc').textContent = QZ.sc;
            document.getElementById('rdet').textContent = `${ok} benar dari ${tot} soal — Salah: ${QZ.cnc} — Streak terbaik: ${QZ.ms}`;
            document.getElementById('rsts').querySelectorAll('.st').forEach((s, i) => s.classList.toggle('ed', i < st));
            document.getElementById('rmasc').innerHTML = mascot(st >= 2 ? 'exc' : 'happy', 100);
            nav('s-res');
            if (st >= 2) { AU.win(); setTimeout(() => { CF.burst(innerWidth / 2, innerHeight / 3, 80); if (st === 3) { setTimeout(() => CF.burst(innerWidth * .3, innerHeight * .4, 50), 200); setTimeout(() => CF.burst(innerWidth * .7, innerHeight * .4, 50), 400) } }, 300) } else AU.win()
        }

        // ==================== LEVEL SELECT ====================
        const LVL_ORDER = ['peringatan', 'larangan', 'perintah', 'petunjuk', 'keselamatan'];
        function isUnl(id) { const i = LVL_ORDER.indexOf(id); if (i <= 0) return true; return GS.cat[LVL_ORDER[i - 1]] && GS.cat[LVL_ORDER[i - 1]].st >= 1 }
        function renderLvl() {
            const g = document.getElementById('lvlg'); let h = '';
            CATS.forEach(c => {
                const u = isUnl(c.id), d = GS.cat[c.id], tq = QS[c.id] ? QS[c.id].length : 0;
                const ss = [0, 1, 2].map(i => `<i class="fa-solid fa-star ${i < d.st ? '' : 'e'}"></i>`).join(' ');
                h += `<div class="lc ${u ? '' : 'lk'}" ${u ? `onclick="startQ('${c.id}')"` : ''}><div class="li" style="color:${c.color}"><i class="fa-solid ${c.icon}"></i></div><div class="ln">${c.name}</div><div class="lp">${tq} soal — Skor terbaik: ${d.bs}</div><div class="ls">${ss}</div></div>`
            });
            const ad = LVL_ORDER.every(c => GS.cat[c]?.st >= 1);
            const cd = GS.ch; const cst = cd.bs >= 3000 ? 3 : cd.bs >= 2000 ? 2 : cd.bs >= 1000 ? 1 : 0;
            const css = [0, 1, 2].map(i => `<i class="fa-solid fa-star ${i < cst ? '' : 'e'}"></i>`).join(' ');

<div class="sli"><span><i class="fa-solid fa-clock" style="margin-right:6px;color:var(--warn)"></i> Timer Quiz</span><div class="tg ${GS.set.tmr ? 'on' : ''}" onclick="tglSet('tmr',this)"></div></div>
<div style="margin-top:10px;padding:11px 13px;background:#E8F0FE;border:2px solid var(--brd);border-radius:9px;font-size:.78rem;color:var(--mut);font-weight:700;line-height:1.5">
<i class="fa-solid fa-circle-info" style="color:var(--pri);margin-right:4px"></i><strong>Timer:</strong> Jika aktif, tiap soal batas 20 detik. Mode Tantangan selalu pakai timer 15 detik.</div>
<div style="margin-top:8px;padding:11px 13px;background:#FFF3E0;border:2px solid var(--brd);border-radius:9px;font-size:.78rem;color:var(--mut);font-weight:700;line-height:1.5">
<i class="fa-solid fa-folder-open" style="color:var(--acc);margin-right:4px"></i><strong>Folder Gambar:</strong> Pastikan folder <code>gudang/rambu-peringatan/</code>, <code>gudang/rambu-larangan/</code>, <code>gudang/rambu-perintah/</code>, dan <code>gudang/rambu-petunjuk/</code> sudah berisi file gambar rambu. Jika gambar tidak ditemukan, akan tampil rambu pengganti berupa kode.</div>`
        }
        function tglSet(k, el) { AU.init(); AU.clk(); GS.set[k] = !GS.set[k]; el.classList.toggle('on', GS.set[k]); save(); if (k === 'snd') AU.snd = GS.set.snd }
        function cfmReset() { cshow('Yakin hapus semua progres? Skor, bintang, dan leaderboard akan direset permanen.', () => { GS = JSON.parse(JSON.stringify(DEF)); save(); toast('Semua progres telah dihapus'); renderSet() }) }

        // ==================== START / CONTINUE ====================
        function doStart() {
            for (const id of LVL_ORDER) { if (!isUnl(id)) continue; if (GS.cat[id].st < 3) { startQ(id); return } }
            if (LVL_ORDER.every(c => GS.cat[c].st >= 3)) { startQ(null, true) } else { nav('s-lvl'); renderLvl() }
        }

        // ==================== UTILITAS ====================
        function shuf(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.random() * (i + 1) | 0;[a[i], a[j]] = [a[j], a[i]] } return a }

        // ==================== INISIALISASI ====================
        document.addEventListener('DOMContentLoaded', () => {
            load(); CF.init(); AU.snd = GS.set.snd; AU.mus = GS.set.mus;
            document.getElementById('mmasc').innerHTML = mascot('happy', 110);
            renderLvl();
            const ua = () => { AU.init(); document.removeEventListener('click', ua); document.removeEventListener('touchstart', ua) };
            document.addEventListener('click', ua); document.addEventListener('touchstart', ua);
            document.addEventListener('keydown', e => { if (e.key === 'Escape') { if (document.getElementById('gmod').classList.contains('v')) { gmodCls() } else if (document.getElementById('cmod').classList.contains('v')) { ccls() } else if (curScr === 's-quiz') { cfmQuit() } else if (curScr !== 's-menu') { nav('s-menu') } } });
            document.getElementById('gmod').addEventListener('click', e => { if (e.target.id === 'gmod') gmodCls() });
        });
    </script>
</body>
